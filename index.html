      background: linear-gradient(180deg, #8cb898 0%, #a0c8a8 10%, #b8d8c0 100%);
      border: 3px solid #555;
      border-radius: 8px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
      image-rendering: pixelated;
    }
    .screen-lcd {
      background: linear-gradient(180deg, #87b891 0%, #9cc8a4 50%, #aed4b4 100%);
    }
    .wheel-outer {
      background: radial-gradient(circle, #e0e0e0 0%, #c0c0c0 60%, #a0a0a0 100%);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.3),
        inset 0 1px 2px rgba(255,255,255,0.4),
        inset 0 -1px 2px rgba(0,0,0,0.2);
    }
    .wheel-center {
      background: radial-gradient(circle, #f0f0f0 0%, #d8d8d8 60%, #c0c0c0 100%);
      box-shadow:
        0 2px 6px rgba(0,0,0,0.25),
        inset 0 1px 3px rgba(255,255,255,0.6);
    }
    .wheel-center:active, .wheel-center.pressed {
      background: radial-gradient(circle, #d8d8d8 0%, #c0c0c0 60%, #a8a8a8 100%);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    .wheel-label {
      color: #666;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      user-select: none;
      pointer-events: none;
    }
    .menu-item { transition: background 0.05s; }
    .menu-item.selected {
      background: linear-gradient(180deg, #4a7eff 0%, #2860e0 100%);
      color: white;
    }
    .status-bar {
      border-bottom: 1px solid rgba(0,0,0,0.15);
      background: rgba(0,0,0,0.05);
    }
    .progress-bar-bg {
      background: rgba(0,0,0,0.15);
      border-radius: 3px;
      height: 6px;
    }
    .progress-bar-fill {
      background: #333;
      border-radius: 3px;
      height: 100%;
      transition: width 0.3s;
    }
    .scroll-indicator {
      width: 4px;
      background: rgba(0,0,0,0.1);
      border-radius: 2px;
      position: absolute;
      right: 4px;
      top: 28px;
      bottom: 4px;
    }
    .scroll-thumb {
      width: 4px;
      background: rgba(0,0,0,0.35);
      border-radius: 2px;
      position: absolute;
      right: 4px;
      transition: top 0.1s;
    }
    .btn-flash { animation: flash 0.15s ease-out; }
    @keyframes flash {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    .volume-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
      font-size: 11px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 10;
    }
    .volume-overlay.show { opacity: 1; }
    .ticker-text {
      display: inline-block;
      white-space: nowrap;
      animation: ticker 8s linear infinite;
    }
    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>

 <body class="h-full bg-black-250 flex items-center justify-center overflow-auto">
  <div class="flex flex-col items-center justify-center w-full h-full p-4" id="app-wrapper"><!-- iPod Body -->
   <div class="ipod-body relative flex flex-col items-center" style="width: 280px; padding: 20px 20px 28px;"><!-- Screen -->
    <div class="ipod-screen w-full relative overflow-hidden ipod-screen-font" style="height: 200px;" id="ipod-screen"><!-- Status Bar -->
     <div class="status-bar flex items-center justify-between px-2 py-1" style="font-size: 10px; color: #333;"><span id="status-title" class="font-semibold">iPod</span>
      <div class="flex items-center gap-1"><span id="status-play-icon" style="display:none;">▶</span>

        <rect x="0" y="0" width="16" height="10" rx="2" fill="none" stroke="#333" stroke-width="1" /><rect x="16" y="3" width="2" height="4" rx="0.5" fill="#333" /><rect id="battery-fill" x="2" y="2" width="12" height="6" rx="1" fill="#333" />

       </div>

       <p class="text-gray-600 mb-3" style="font-size: 9px; line-height: 1.3;">Select a folder with audio files<br>
        (MP3, WAV, OGG, M4A, FLAC)</p><label class="bg-gray-700 text-white text-xs px-4 py-1.5 rounded-full cursor-pointer hover:bg-gray-600 transition-colors font-medium"> Choose Folder <input type="file" id="folder-input" webkitdirectory multiple accept="audio/*" class="hidden"> </label>

    <div class="relative mt-6 flex items-center justify-center" style="width: 200px; height: 200px;">
     <div id="click-wheel" class="wheel-outer rounded-full absolute inset-0 cursor-pointer select-none" style="width: 200px; height: 200px;"><!-- Labels -->
      <div class="wheel-label absolute top-3 left-1/2 -translate-x-1/2" style="font-size:10px;">
       MENU
      </div>
      <div class="wheel-label absolute bottom-2.5 left-1/2 -translate-x-1/2 flex items-center gap-0.5"><span style="font-size:8px;">▶</span><span style="font-size:8px;">❚❚</span>
      </div>
      <div class="wheel-label absolute left-3 top-1/2 -translate-y-1/2" style="font-size:10px;">
       ◁◁

       ▷▷
      </div>
     </div><!-- Center Button -->
     <div id="center-btn" class="wheel-center rounded-full absolute cursor-pointer z-10 flex items-center justify-center" style="width: 72px; height: 72px;">
     </div>
    </div>
   </div><!-- File info -->
   <p class="text-gray-500 text-xs mt-4 text-center max-w-xs" id="hint-text">Use the click wheel to scroll • Center to select • Drag in circles!</p>
  </div>
  <audio id="audio-player" preload="auto"></audio>
  <script>
// ============ STATE ============
const state = {
  currentView: 'folder', // 'folder' | 'menu' | 'nowplaying'
  tracks: [],
  selectedIndex: 0,
  scrollOffset: 0,
  playingIndex: -1,
  isPlaying: false,
  volume: 0.5,
  menuItems: [
    { label: 'Load Music…', action: 'loadFolder' }
  ]
};

const VISIBLE_ITEMS = 7;
const ITEM_HEIGHT = 24;
const audio = document.getElementById('audio-player');
audio.volume = state.volume;

// ============ VIEWS ============
function showView(name) {
  state.currentView = name;
  document.getElementById('view-menu').classList.toggle('hidden', name !== 'menu');
  document.getElementById('view-nowplaying').classList.toggle('hidden', name !== 'nowplaying');
  document.getElementById('view-folder').classList.toggle('hidden', name !== 'folder');

  const titleEl = document.getElementById('status-title');
  if (name === 'menu') titleEl.textContent = deviceTitle;
  else if (name === 'nowplaying') titleEl.textContent = 'Now Playing';
  else titleEl.textContent = deviceTitle;
}

// ============ MENU RENDERING ============
function getMenuItems() {
  if (state.tracks.length === 0) return state.menuItems;
  return [
    ...state.tracks.map((t, i) => ({ label: t.name, action: 'play', index: i })),
    { label: 'Load More Music…', action: 'loadFolder' }
  ];
}

function renderMenu() {
  const items = getMenuItems();
  const list = document.getElementById('menu-list');
  const totalItems = items.length;

  // Clamp selection
  if (state.selectedIndex < 0) state.selectedIndex = 0;
  if (state.selectedIndex >= totalItems) state.selectedIndex = totalItems - 1;

  // Scroll offset
  if (state.selectedIndex < state.scrollOffset) state.scrollOffset = state.selectedIndex;
  if (state.selectedIndex >= state.scrollOffset + VISIBLE_ITEMS) state.scrollOffset = state.selectedIndex - VISIBLE_ITEMS + 1;

  // Build items if count changed
  const childCount = list.children.length;
  if (childCount !== VISIBLE_ITEMS) {
    list.innerHTML = '';
    for (let i = 0; i < VISIBLE_ITEMS; i++) {
      const div = document.createElement('div');
      div.className = 'menu-item px-2 flex items-center';
      div.style.height = ITEM_HEIGHT + 'px';
      div.style.fontSize = '12px';
      div.style.lineHeight = ITEM_HEIGHT + 'px';
      list.appendChild(div);
    }
  }

  // Update content
  const children = list.children;
  for (let i = 0; i < VISIBLE_ITEMS; i++) {
    const idx = state.scrollOffset + i;
    const el = children[i];
    if (idx < totalItems) {
      const item = items[idx];
      const prefix = (item.action === 'play' && state.playingIndex === item.index && state.isPlaying) ? '▶ ' : '';
      el.textContent = prefix + item.label;
      el.classList.toggle('selected', idx === state.selectedIndex);
      el.style.display = '';
    } else {
      el.textContent = '';
      el.classList.remove('selected');
      el.style.display = 'none';
    }
  }

  // Scroll thumb
  const thumb = document.getElementById('scroll-thumb');
  const trackH = 200 - 28 - 8;
  if (totalItems <= VISIBLE_ITEMS) {
    thumb.style.display = 'none';
  } else {
    thumb.style.display = '';
    const thumbH = Math.max(16, (VISIBLE_ITEMS / totalItems) * trackH);
    const thumbTop = 28 + (state.selectedIndex / (totalItems - 1)) * (trackH - thumbH);
    thumb.style.height = thumbH + 'px';
    thumb.style.top = thumbTop + 'px';
  }
}

// ============ NOW PLAYING ============
let progressRAF;
function updateNowPlaying() {
  if (state.playingIndex < 0) return;
  const track = state.tracks[state.playingIndex];
  if (!track) return;

  document.getElementById('np-title').textContent = track.name + '   •   ' + track.name + '   •   ';
  document.getElementById('status-play-icon').style.display = state.isPlaying ? '' : 'none';

  function tick() {
    if (!state.isPlaying) return;
    const dur = audio.duration || 0;
    const cur = audio.currentTime || 0;
    const pct = dur > 0 ? (cur / dur) * 100 : 0;
    document.getElementById('np-progress').style.width = pct + '%';
    document.getElementById('np-elapsed').textContent = formatTime(cur);
    document.getElementById('np-remaining').textContent = '-' + formatTime(Math.max(0, dur - cur));
    progressRAF = requestAnimationFrame(tick);
  }
  cancelAnimationFrame(progressRAF);
  if (state.isPlaying) tick();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ============ ACTIONS ============
function selectItem() {
  const items = getMenuItems();
  const item = items[state.selectedIndex];
  if (!item) return;

  if (item.action === 'loadFolder') {
    document.getElementById('folder-input').click();
  } else if (item.action === 'play') {
    playTrack(item.index);
  }
}

function playTrack(index) {
  const track = state.tracks[index];
  if (!track) return;
  state.playingIndex = index;
  state.isPlaying = true;
  const url = URL.createObjectURL(track.file);
  audio.src = url;
  audio.play().catch(() => {});
  showView('nowplaying');
  updateNowPlaying();
}

function togglePlayPause() {
  if (state.currentView === 'nowplaying') {
    if (state.isPlaying) {
      audio.pause();
      state.isPlaying = false;
    } else {
      audio.play().catch(() => {});
      state.isPlaying = true;
    }
    updateNowPlaying();
  }
}

function nextTrack() {
  if (state.tracks.length === 0) return;
  const next = (state.playingIndex + 1) % state.tracks.length;
  playTrack(next);
}

function prevTrack() {
  if (state.tracks.length === 0) return;
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
    return;
  }
  const prev = (state.playingIndex - 1 + state.tracks.length) % state.tracks.length;
  playTrack(prev);
}

function goBack() {
  if (state.currentView === 'nowplaying') {
    showView('menu');
    renderMenu();
  } else if (state.currentView === 'menu' && state.tracks.length === 0) {
    showView('folder');
  }
}

// Volume
let volumeTimeout;
function showVolume() {
  const overlay = document.getElementById('volume-overlay');
  overlay.classList.add('show');
  document.getElementById('volume-bar').style.width = (state.volume * 100) + '%';
  clearTimeout(volumeTimeout);
  volumeTimeout = setTimeout(() => overlay.classList.remove('show'), 1200);
}

// ============ CLICK WHEEL LOGIC ============
const wheel = document.getElementById('click-wheel');
const centerBtn = document.getElementById('center-btn');
let isDragging = false;
let lastAngle = null;
let accumulatedAngle = 0;
const ANGLE_PER_STEP = 30; // degrees per scroll step
let clickStartTarget = null;

/**
 * Calculate angle (in degrees) from center of wheel to point (x, y).
 * Uses Math.atan2 to get the angle in radians, then converts to degrees.
 * 0° = right, 90° = down, 180°/-180° = left, -90° = up
 */
function getAngle(x, y, rect) {
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = x - cx;
  const dy = y - cy;
  return Math.atan2(dy, dx) * (180 / Math.PI);
}

/**
 * Check if point is within the center button area
 */
function isInCenter(x, y, rect) {
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
  return dist < 36;
}

/**
 * Determine which quadrant button was pressed based on angle
 */
function getWheelZone(x, y, rect) {
  if (isInCenter(x, y, rect)) return 'center';
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
  if (dist > rect.width / 2) return null;

  const angle = getAngle(x, y, rect);
  // Top: Menu (-135 to -45), Right: Forward (-45 to 45), Bottom: Play (45 to 135), Left: Back (135 to 180 or -180 to -135)
  if (angle >= -135 && angle < -45) return 'menu';
  if (angle >= -45 && angle < 45) return 'forward';
  if (angle >= 45 && angle < 135) return 'playpause';
  return 'backward';
}

/**
 * Calculate the shortest angular difference between two angles,
 * accounting for the wrap-around at ±180°.
 */
function angleDiff(a, b) {
  let diff = a - b;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  return diff;
}

// Mouse/Touch handlers for the wheel
function onPointerDown(e) {
  e.preventDefault();
  const rect = wheel.getBoundingClientRect();
  const px = e.clientX || (e.touches && e.touches[0].clientX);
  const py = e.clientY || (e.touches && e.touches[0].clientY);

  if (isInCenter(px, py, rect)) {
    clickStartTarget = 'center';
    centerBtn.classList.add('pressed');
    return;
  }

  const zone = getWheelZone(px, py, rect);
  if (!zone) return;

  clickStartTarget = zone;
  isDragging = true;
  lastAngle = getAngle(px, py, rect);
  accumulatedAngle = 0;
}

function onPointerMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const rect = wheel.getBoundingClientRect();
  const px = e.clientX || (e.touches && e.touches[0].clientX);
  const py = e.clientY || (e.touches && e.touches[0].clientY);

  if (isInCenter(px, py, rect)) return;

  const currentAngle = getAngle(px, py, rect);
  if (lastAngle === null) { lastAngle = currentAngle; return; }

  const delta = angleDiff(currentAngle, lastAngle);
  accumulatedAngle += delta;
  lastAngle = currentAngle;

  // If enough rotation accumulated, trigger scroll
  if (Math.abs(accumulatedAngle) >= ANGLE_PER_STEP) {
    const steps = Math.floor(Math.abs(accumulatedAngle) / ANGLE_PER_STEP);
    const direction = accumulatedAngle > 0 ? 1 : -1;

    if (state.currentView === 'menu') {
      // Clockwise (positive) = scroll down, Counter-clockwise = scroll up
      state.selectedIndex += direction * steps;
      const items = getMenuItems();
      state.selectedIndex = Math.max(0, Math.min(state.selectedIndex, items.length - 1));
      renderMenu();
    } else if (state.currentView === 'nowplaying') {
      // In now playing, wheel controls volume
      state.volume = Math.max(0, Math.min(1, state.volume + direction * steps * 0.05));
      audio.volume = state.volume;
      showVolume();
    }

    accumulatedAngle = accumulatedAngle % ANGLE_PER_STEP;
    clickStartTarget = null; // moved, so it's a drag not a click
  }
}

function onPointerUp(e) {
  isDragging = false;
  lastAngle = null;
  centerBtn.classList.remove('pressed');

  if (clickStartTarget) {
    // It was a tap, not a drag
    switch (clickStartTarget) {
      case 'center': selectItem(); break;
      case 'menu': goBack(); break;
      case 'playpause': togglePlayPause(); break;
      case 'forward': nextTrack(); break;
      case 'backward': prevTrack(); break;
    }
  }
  clickStartTarget = null;
}

// Attach events
wheel.addEventListener('mousedown', onPointerDown);
wheel.addEventListener('touchstart', onPointerDown, { passive: false });
centerBtn.addEventListener('mousedown', onPointerDown);
centerBtn.addEventListener('touchstart', onPointerDown, { passive: false });
document.addEventListener('mousemove', onPointerMove);
document.addEventListener('touchmove', onPointerMove, { passive: false });
document.addEventListener('mouseup', onPointerUp);
document.addEventListener('touchend', onPointerUp);

// ============ FILE LOADING ============
const AUDIO_EXTS = ['.mp3', '.wav', '.ogg', '.m4a', '.flac', '.aac', '.wma', '.opus', '.webm'];

document.getElementById('folder-input').addEventListener('change', function(e) {
  const files = Array.from(e.target.files).filter(f => {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    return AUDIO_EXTS.includes(ext);
  }).sort((a, b) => a.name.localeCompare(b.name));

  if (files.length === 0) return;

  state.tracks = files.map(f => ({
    name: f.name.replace(/\.[^.]+$/, ''),
    file: f
  }));
  state.selectedIndex = 0;
  state.scrollOffset = 0;
  showView('menu');
  renderMenu();
});

// Audio ended -> next track
audio.addEventListener('ended', () => nextTrack());

// ============ ELEMENT SDK ============
let deviceTitle = 'iPod';

const defaultConfig = {
  device_title: 'iPod',
  background_color: '#111827',
  surface_color: '#d4d4d4',
  text_color: '#333333',
  primary_action_color: '#4a7eff',
  font_family: 'SF Pro Text',
  font_size: 12
};

function applyConfig(config) {
  deviceTitle = config.device_title || defaultConfig.device_title;
  document.getElementById('status-title').textContent = deviceTitle;
  document.getElementById('app-wrapper').style.backgroundColor = config.background_color || defaultConfig.background_color;
  document.getElementById('hint-text').style.color = config.text_color || '#9ca3af';

  // Font
  const font = config.font_family || defaultConfig.font_family;
  document.querySelectorAll('.ipod-screen-font, .menu-item').forEach(el => {
    el.style.fontFamily = `${font}, Helvetica Neue, Geneva, sans-serif`;
  });
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family,
